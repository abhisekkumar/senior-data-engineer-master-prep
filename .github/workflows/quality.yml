name: Quality checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - dev

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: make test

      - name: Run Ruff
        run: make lint

      - name: Validate question records
        run: make validate
